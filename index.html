<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="true">
<meta name="apple-mobile-web-app-capable" content="true">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OfflinePlay">
<title>OfflinePlay</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#fff;--border:#2a2a2a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --player-h:80px;--nav-h:60px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* TOP BAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0}
#topbar h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
#topbar h1 span{color:var(--text2);font-weight:400}
.icon-btn{background:var(--bg3);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
.icon-btn:active{opacity:0.7}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px}

/* SECTIONS */
.section{padding:0 16px;margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2)}
.section-action{font-size:12px;color:var(--text2);background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit}
.section-action:active{background:var(--bg3)}

/* MEDIA GRID */
.media-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.media-card{background:var(--bg2);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);position:relative;transition:opacity 0.1s}
.media-card:active{opacity:0.7}
.media-card.playing{border-color:var(--accent)}
.media-thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--bg3);position:relative;overflow:hidden}
.media-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.media-thumb .emoji{position:relative;z-index:1}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;z-index:2;transition:background 0.15s}
.media-card.playing .play-overlay{background:rgba(0,0,0,0.3)}
.playing-indicator{display:none;gap:2px;align-items:flex-end;height:16px}
.media-card.playing .playing-indicator{display:flex}
.playing-indicator span{width:3px;background:#fff;border-radius:2px;animation:bar 0.8s ease-in-out infinite}
.playing-indicator span:nth-child(2){animation-delay:0.15s}
.playing-indicator span:nth-child(3){animation-delay:0.3s}
@keyframes bar{0%,100%{height:4px}50%{height:14px}}
.thumb-edit-btn{position:absolute;bottom:6px;right:6px;z-index:4;background:rgba(0,0,0,0.65);border:none;border-radius:6px;cursor:pointer;color:#fff;font-size:11px;padding:4px 8px;font-family:inherit;display:flex;align-items:center;gap:3px}
.badge-offline{position:absolute;top:6px;left:6px;z-index:4;background:rgba(0,0,0,0.6);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:0.04em}
.media-body{padding:10px}
.media-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-meta{font-size:11px;color:var(--text2);margin-top:2px}

/* PLAYLISTS */
.playlist-list{display:flex;flex-direction:column;gap:8px}
.playlist-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.playlist-item:active{opacity:0.7}
.playlist-icon{width:44px;height:44px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.playlist-icon img{width:100%;height:100%;object-fit:cover}
.playlist-info{flex:1;min-width:0}
.playlist-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.playlist-meta{font-size:11px;color:var(--text2);margin-top:2px}
.playlist-arrow{color:var(--text3);font-size:16px}
.new-playlist-btn{background:var(--bg2);border:1px dashed var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;width:100%}
.new-playlist-btn:active{background:var(--bg3)}

/* BOTTOM NAV */
#nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bot);background:var(--bg)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;gap:4px;border:none;background:none;color:var(--text2);font-family:inherit;font-size:10px;font-weight:500;letter-spacing:0.04em;transition:color 0.15s}
.nav-tab.active{color:var(--text)}
.nav-tab svg{width:22px;height:22px}

/* PLAYER */
#player{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:calc(10px + var(--safe-bot));flex-shrink:0;display:none}
#player.visible{display:block}
.player-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
#player-thumb{width:44px;height:44px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
#player-thumb img{width:100%;height:100%;object-fit:cover}
#player-info{flex:1;min-width:0}
#player-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#player-sub{font-size:11px;color:var(--text2);margin-top:1px}
.player-controls{display:flex;align-items:center;justify-content:center;gap:20px}
.p-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:50%;display:flex;font-size:24px}
.p-btn:active{color:var(--text)}
.p-btn.main{background:var(--accent);color:var(--bg);width:44px;height:44px;justify-content:center;font-size:20px;border-radius:50%}
.p-btn.main:active{opacity:0.8}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#progress-bar{flex:1;height:3px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative}
#progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.4s linear}
.time{font-size:10px;color:var(--text2);min-width:30px}
#time-cur{text-align:right}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.7);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.modal-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px;overflow:hidden}
.modal-preview img{width:100%;height:100%;object-fit:cover}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--text3)}
.modal-actions{display:flex;gap:8px}
.m-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.m-btn.secondary{background:var(--bg3);color:var(--text2)}
.m-btn.primary{background:var(--accent);color:var(--bg)}
.m-btn:active{opacity:0.8}

/* PLAYLIST DETAIL VIEW */
#playlist-view{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;padding-bottom:120px}
#playlist-view.open{display:block}
.pv-header{padding:calc(var(--safe-top) + 12px) 16px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.pv-back{background:var(--bg3);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0}
.pv-title{font-size:17px;font-weight:600;flex:1}
.track-list{padding:12px 16px}
.track-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.track-item:last-child{border-bottom:none}
.track-item:active{opacity:0.7}
.track-thumb{width:42px;height:42px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.track-thumb img{width:100%;height:100%;object-fit:cover}
.track-info{flex:1;min-width:0}
.track-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-type{font-size:11px;color:var(--text2);margin-top:2px}
.track-remove{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}
.add-to-pl-btn{margin:12px 16px 0;width:calc(100% - 32px);padding:13px;background:var(--bg2);border:1px dashed var(--border);border-radius:12px;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.add-to-pl-btn:active{background:var(--bg3)}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.5}
.import-big{margin:16px auto 0;display:flex;align-items:center;gap:8px;background:var(--accent);color:var(--bg);border:none;border-radius:12px;padding:13px 24px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}

/* PICK FROM LIBRARY (ajouter à playlist) */
#pick-modal .track-item{border-bottom:1px solid var(--border)}
.pick-check{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.pick-check.checked{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* VIDEO */
#video-modal{display:none;position:fixed;inset:0;z-index:500;background:#000;align-items:center;justify-content:center;flex-direction:column}
#video-modal.open{display:flex}
#vid-player{width:100%;max-height:80vh}
#vid-close{margin-top:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--player-h) + 16px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg4);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>Offline<span>Play</span></h1>
    <button class="icon-btn" id="import-btn" onclick="document.getElementById('file-input').click()" aria-label="Importer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="file-input" style="display:none" multiple accept="audio/*,video/*" onchange="handleFiles(this.files)">
  </div>

  <div id="content"></div>

  <!-- Player -->
  <div id="player">
    <div class="player-top">
      <div id="player-thumb"><span id="player-thumb-emoji">🎵</span></div>
      <div id="player-info">
        <div id="player-title">—</div>
        <div id="player-sub">—</div>
      </div>
      <button class="icon-btn" id="add-to-pl-quick" onclick="openAddToPlaylistModal(-1)" aria-label="Ajouter à une playlist" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span class="time" id="time-cur" style="text-align:right">0:00</span>
      <div id="progress-bar" onclick="seekTo(event)"><div id="progress-fill"></div></div>
      <span class="time" id="time-tot">0:00</span>
    </div>
    <div class="player-controls">
      <button class="p-btn" onclick="prevTrack()" aria-label="Précédent">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="p-btn main" id="play-btn" onclick="togglePlay()" aria-label="Lecture/Pause">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="p-btn" onclick="nextTrack()" aria-label="Suivant">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav id="nav">
    <button class="nav-tab active" id="tab-home" onclick="showTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-tab" id="tab-music" onclick="showTab('music')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Musique
    </button>
    <button class="nav-tab" id="tab-videos" onclick="showTab('videos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Vidéos
    </button>
    <button class="nav-tab" id="tab-playlists" onclick="showTab('playlists')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Playlists
    </button>
  </nav>
</div>

<!-- Playlist detail view -->
<div id="playlist-view">
  <div class="pv-header">
    <button class="pv-back" onclick="closePlaylistView()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="pv-title" id="pv-title">Playlist</div>
    <button class="icon-btn" onclick="openAddToPlaylistPickModal()" aria-label="Ajouter des fichiers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="track-list" id="pv-tracks"></div>
</div>

<!-- Video modal -->
<div id="video-modal">
  <video id="vid-player" controls playsinline></video>
  <button id="vid-close" onclick="closeVideo()">✕ Fermer</button>
</div>

<!-- Thumb modal -->
<div class="modal-overlay" id="thumb-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Choisir une miniature</div>
    <div class="modal-sub" id="thumb-modal-name">—</div>
    <div class="modal-preview" id="thumb-preview"><span id="thumb-prev-emoji">🎵</span></div>
    <input type="file" id="thumb-file-input" style="display:none" accept="image/*" onchange="previewThumb(this)">
    <div class="modal-actions">
      <button class="m-btn secondary" onclick="closeThumbModal()">Annuler</button>
      <button class="m-btn secondary" onclick="document.getElementById('thumb-file-input').click()">📷 Choisir</button>
      <button class="m-btn primary" onclick="saveThumb()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- New playlist modal -->
<div class="modal-overlay" id="new-pl-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouvelle playlist</div>
    <input class="modal-input" id="pl-name-input" type="text" placeholder="Nom de la playlist…" maxlength="50">
    <div class="modal-actions">
      <button class="m-btn secondary" onclick="closeNewPlModal()">Annuler</button>
      <button class="m-btn primary" onclick="createPlaylist()">Créer</button>
    </div>
  </div>
</div>

<!-- Pick files to add to playlist -->
<div class="modal-overlay" id="pick-modal">
  <div class="modal-sheet" style="max-height:80vh">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter à la playlist</div>
    <div class="modal-sub">Sélectionne les fichiers à ajouter</div>
    <div id="pick-list"></div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="m-btn secondary" onclick="closePickModal()">Annuler</button>
      <button class="m-btn primary" onclick="confirmAddToPlaylist()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Add current track to playlist -->
<div class="modal-overlay" id="add-to-pl-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter à une playlist</div>
    <div id="atp-list" style="margin-bottom:14px"></div>
    <button class="m-btn secondary" onclick="closeAddToPlaylistModal()" style="width:100%">Annuler</button>
  </div>
</div>

<audio id="audio-el"></audio>
<div id="toast"></div>

<script>
const DB_NAME='offlineplay_v3',DB_VER=1;
let db,library=[],playlists=[],currentIdx=-1,isPlaying=false,currentTab='home';
let thumbEditId=null,thumbPendingData=null,currentQueue=[],currentPlaylistId=null;
let openPlaylistId=null;
const audio=document.getElementById('audio-el');
const ICONS={audio:'🎵',video:'🎬',podcast:'🎙'};
const TYPE_LABEL={audio:'Musique',video:'Vidéo',podcast:'Podcast'};

// ─── DB ─────────────────────────────────────────────────────────────
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('files'))d.createObjectStore('files',{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains('playlists'))d.createObjectStore('playlists',{keyPath:'id',autoIncrement:true});
    };
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=()=>rej();
  });
}
function dbAll(store){return new Promise(res=>{const t=db.transaction(store,'readonly'),q=t.objectStore(store).getAll();q.onsuccess=()=>res(q.result);})}
function dbAdd(store,data){return new Promise(res=>{const t=db.transaction(store,'readwrite');const q=t.objectStore(store).add(data);t.oncomplete=()=>res(q.result);})}
function dbPut(store,data){return new Promise(res=>{const t=db.transaction(store,'readwrite');t.objectStore(store).put(data);t.oncomplete=()=>res();})}
function dbDel(store,id){return new Promise(res=>{const t=db.transaction(store,'readwrite');t.objectStore(store).delete(id);t.oncomplete=()=>res();})}

async function refresh(){
  library=await dbAll('files');
  playlists=await dbAll('playlists');
  renderTab();
}

// ─── IMPORT ─────────────────────────────────────────────────────────
async function handleFiles(files){
  let count=0;
  for(const file of files){
    const buf=await file.arrayBuffer();
    const t=file.type.startsWith('video')?'video':(file.name.toLowerCase().includes('podcast'))?'podcast':'audio';
    await dbAdd('files',{name:file.name.replace(/\.[^.]+$/,''),type:t,mime:file.type,data:buf,size:file.size,thumb:null,added:Date.now()});
    count++;
  }
  await refresh();
  showToast(count+' fichier'+(count>1?'s':'')+' ajouté'+(count>1?'s':'')+'');
  document.getElementById('file-input').value='';
}

// ─── TABS ────────────────────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  ['home','music','videos','playlists'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  renderTab();
}

function renderTab(){
  const el=document.getElementById('content');
  if(currentTab==='home') renderHome(el);
  else if(currentTab==='music') renderLibrary(el,'audio');
  else if(currentTab==='videos') renderLibrary(el,'video');
  else if(currentTab==='playlists') renderPlaylists(el);
}

// ─── HOME ────────────────────────────────────────────────────────────
function renderHome(el){
  if(!library.length){
    el.innerHTML=`<div class="empty">
      <div class="icon">🎧</div>
      <p>Bienvenue sur OfflinePlay !<br>Importe de la musique, des vidéos ou des podcasts pour commencer.</p>
      <button class="import-big" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importer des fichiers
      </button>
    </div>`;
    return;
  }
  let html='';
  const recent=library.slice().sort((a,b)=>b.added-a.added).slice(0,6);
  html+=`<div class="section"><div class="section-header"><span class="section-title">Récents</span><button class="section-action" onclick="showTab('music')">Voir tout</button></div><div class="media-grid">${recent.map(f=>cardHTML(f)).join('')}</div></div>`;
  if(playlists.length){
    html+=`<div class="section"><div class="section-header"><span class="section-title">Playlists</span><button class="section-action" onclick="showTab('playlists')">Voir tout</button></div><div class="playlist-list">${playlists.slice(0,3).map(p=>playlistItemHTML(p)).join('')}</div></div>`;
  }
  el.innerHTML=html;
}

// ─── LIBRARY ─────────────────────────────────────────────────────────
function renderLibrary(el,type){
  const items=library.filter(f=>f.type===type);
  const label=type==='audio'?'Musique':'Vidéos';
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="icon">${type==='audio'?'🎵':'🎬'}</div><p>Aucun${type==='video'?'e':''} ${label.toLowerCase()} importé${type==='video'?'e':''}.</p><button class="import-big" onclick="document.getElementById('file-input').click()">Importer</button></div>`;
    return;
  }
  el.innerHTML=`<div class="section"><div class="section-header"><span class="section-title">${items.length} ${label}</span></div><div class="media-grid">${items.map(f=>cardHTML(f)).join('')}</div></div>`;
}

function cardHTML(f){
  const gi=library.indexOf(f);
  const isPlaying2=currentIdx===gi&&isPlaying;
  return `<div class="media-card${currentIdx===gi?' playing':''}" onclick="playItem(${gi})">
    <span class="badge-offline">hors-ligne</span>
    <div class="media-thumb">
      ${f.thumb?`<img src="${f.thumb}" alt="">`:''}
      <span class="emoji" ${f.thumb?'style="display:none"':''}>${ICONS[f.type]||'🎵'}</span>
      <div class="play-overlay"><div class="playing-indicator"><span></span><span></span><span></span></div></div>
      <button class="thumb-edit-btn" onclick="openThumbModal(event,${f.id})">📷 miniature</button>
    </div>
    <div class="media-body">
      <div class="media-name" title="${f.name}">${f.name}</div>
      <div class="media-meta">${TYPE_LABEL[f.type]} · ${(f.size/1024/1024).toFixed(1)} Mo</div>
    </div>
  </div>`;
}

// ─── PLAYLISTS ───────────────────────────────────────────────────────
function renderPlaylists(el){
  let html=`<div class="section"><div class="section-header"><span class="section-title">${playlists.length} playlist${playlists.length!==1?'s':''}</span></div>
    <div class="playlist-list">`;
  if(playlists.length) html+=playlists.map(p=>playlistItemHTML(p)).join('');
  html+=`<button class="new-playlist-btn" onclick="openNewPlModal()">+ Nouvelle playlist</button>`;
  html+=`</div></div>`;
  el.innerHTML=html;
}

function playlistItemHTML(p){
  const count=p.tracks?p.tracks.length:0;
  const first=p.tracks&&p.tracks.length?library.find(f=>f.id===p.tracks[0]):null;
  const icon=first&&first.thumb?`<img src="${first.thumb}" alt="">`:(first?ICONS[first.type]:'🎵');
  return `<div class="playlist-item" onclick="openPlaylistView(${p.id})">
    <div class="playlist-icon">${typeof icon==='string'&&icon.startsWith('<')?icon:icon}</div>
    <div class="playlist-info">
      <div class="playlist-name">${p.name}</div>
      <div class="playlist-meta">${count} morceau${count!==1?'x':''}</div>
    </div>
    <span class="playlist-arrow">›</span>
  </div>`;
}

// ─── PLAYLIST DETAIL ─────────────────────────────────────────────────
function openPlaylistView(id){
  openPlaylistId=id;
  const pl=playlists.find(p=>p.id===id);
  if(!pl)return;
  document.getElementById('pv-title').textContent=pl.name;
  renderPlaylistTracks(pl);
  document.getElementById('playlist-view').classList.add('open');
}

function renderPlaylistTracks(pl){
  const tracks=(pl.tracks||[]).map(id=>library.find(f=>f.id===id)).filter(Boolean);
  let html='';
  if(!tracks.length){
    html=`<div class="empty" style="padding:32px 0"><div class="icon" style="font-size:32px">🎵</div><p>Playlist vide.<br>Ajoute des fichiers !</p></div>`;
  } else {
    html=tracks.map((f,i)=>`<div class="track-item" onclick="playPlaylistFrom(${openPlaylistId},${i})">
      <div class="track-thumb">${f.thumb?`<img src="${f.thumb}" alt="">`:ICONS[f.type]||'🎵'}</div>
      <div class="track-info">
        <div class="track-name">${f.name}</div>
        <div class="track-type">${TYPE_LABEL[f.type]}</div>
      </div>
      <button class="track-remove" onclick="removeFromPlaylist(event,${openPlaylistId},${f.id})" aria-label="Retirer">✕</button>
    </div>`).join('');
  }
  document.getElementById('pv-tracks').innerHTML=html;
}

function closePlaylistView(){
  document.getElementById('playlist-view').classList.remove('open');
  openPlaylistId=null;
  renderTab();
}

function playPlaylistFrom(plId,startIdx){
  const pl=playlists.find(p=>p.id===plId);
  if(!pl||!pl.tracks||!pl.tracks.length)return;
  const tracks=pl.tracks.map(id=>library.findIndex(f=>f.id===id)).filter(i=>i>=0);
  currentQueue=tracks;
  currentPlaylistId=plId;
  playItem(tracks[startIdx]||tracks[0]);
}

async function removeFromPlaylist(e,plId,fileId){
  e.stopPropagation();
  const pl=playlists.find(p=>p.id===plId);
  if(!pl)return;
  pl.tracks=(pl.tracks||[]).filter(id=>id!==fileId);
  await dbPut('playlists',pl);
  playlists=await dbAll('playlists');
  renderPlaylistTracks(pl);
}

// ─── NEW PLAYLIST ────────────────────────────────────────────────────
function openNewPlModal(){document.getElementById('new-pl-modal').classList.add('open');setTimeout(()=>document.getElementById('pl-name-input').focus(),100);}
function closeNewPlModal(){document.getElementById('new-pl-modal').classList.remove('open');document.getElementById('pl-name-input').value='';}
async function createPlaylist(){
  const name=document.getElementById('pl-name-input').value.trim();
  if(!name)return;
  await dbAdd('playlists',{name,tracks:[],created:Date.now()});
  closeNewPlModal();
  await refresh();
  showToast('Playlist "'+name+'" créée');
}

// ─── PICK FILES FOR PLAYLIST ─────────────────────────────────────────
let pickSelected=new Set();
function openAddToPlaylistPickModal(){
  pickSelected=new Set();
  const pl=playlists.find(p=>p.id===openPlaylistId);
  const existing=new Set(pl?pl.tracks||[]:[]);
  const available=library.filter(f=>!existing.has(f.id));
  if(!available.length){showToast('Tous les fichiers sont déjà dans cette playlist');return;}
  const html=available.map(f=>`<div class="track-item" onclick="togglePick(${f.id},this)">
    <div class="track-thumb">${f.thumb?`<img src="${f.thumb}" alt="">`:ICONS[f.type]||'🎵'}</div>
    <div class="track-info"><div class="track-name">${f.name}</div><div class="track-type">${TYPE_LABEL[f.type]}</div></div>
    <div class="pick-check" id="pick-${f.id}"></div>
  </div>`).join('');
  document.getElementById('pick-list').innerHTML=html;
  document.getElementById('pick-modal').classList.add('open');
}
function togglePick(id,row){
  const check=document.getElementById('pick-'+id);
  if(pickSelected.has(id)){pickSelected.delete(id);check.classList.remove('checked');check.textContent='';}
  else{pickSelected.add(id);check.classList.add('checked');check.textContent='✓';}
}
function closePickModal(){document.getElementById('pick-modal').classList.remove('open');pickSelected=new Set();}
async function confirmAddToPlaylist(){
  if(!pickSelected.size){closePickModal();return;}
  const pl=playlists.find(p=>p.id===openPlaylistId);
  if(!pl)return;
  pl.tracks=[...(pl.tracks||[]),...Array.from(pickSelected)];
  await dbPut('playlists',pl);
  playlists=await dbAll('playlists');
  closePickModal();
  renderPlaylistTracks(pl);
  showToast(pickSelected.size+' fichier'+(pickSelected.size>1?'s':'')+' ajouté'+(pickSelected.size>1?'s':''));
}

// ─── ADD CURRENT TO PLAYLIST ─────────────────────────────────────────
function openAddToPlaylistModal(idx){
  const fileIdx=idx>=0?idx:currentIdx;
  if(fileIdx<0||!library[fileIdx])return;
  const fileId=library[fileIdx].id;
  const html=playlists.length?playlists.map(p=>`<div class="track-item" onclick="addFileToPlaylist(${p.id},${fileId})">
    <div class="track-thumb" style="font-size:16px">${p.tracks&&p.tracks.length&&library.find(f=>f.id===p.tracks[0])&&library.find(f=>f.id===p.tracks[0]).thumb?`<img src="${library.find(f=>f.id===p.tracks[0]).thumb}" alt="">`:ICONS['audio']}</div>
    <div class="track-info"><div class="track-name">${p.name}</div><div class="track-type">${(p.tracks||[]).length} morceau${(p.tracks||[]).length!==1?'x':''}</div></div>
  </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px">Aucune playlist. Crées-en une d'abord !</div>`;
  document.getElementById('atp-list').innerHTML=html;
  document.getElementById('add-to-pl-modal').classList.add('open');
}
function closeAddToPlaylistModal(){document.getElementById('add-to-pl-modal').classList.remove('open');}
async function addFileToPlaylist(plId,fileId){
  const pl=playlists.find(p=>p.id===plId);
  if(!pl)return;
  if(!(pl.tracks||[]).includes(fileId)){
    pl.tracks=[...(pl.tracks||[]),fileId];
    await dbPut('playlists',pl);
    playlists=await dbAll('playlists');
    showToast('Ajouté à "'+pl.name+'"');
  } else showToast('Déjà dans cette playlist');
  closeAddToPlaylistModal();
}

// ─── PLAYBACK ────────────────────────────────────────────────────────
function playItem(idx){
  if(idx<0||idx>=library.length)return;
  const item=library[idx];currentIdx=idx;
  if(!currentQueue.length||!currentQueue.includes(idx)) currentQueue=library.map((_,i)=>i);
  const blob=new Blob([item.data],{type:item.mime});
  const url=URL.createObjectURL(blob);
  if(item.type==='video'){
    const vm=document.getElementById('video-modal');
    document.getElementById('vid-player').src=url;
    vm.classList.add('open');
    document.getElementById('vid-player').play();
    updatePlayerUI(item);renderTab();return;
  }
  audio.src=url;audio.play().then(()=>{isPlaying=true;updatePlayBtn()}).catch(()=>{});
  updatePlayerUI(item);renderTab();
}
function updatePlayerUI(item){
  document.getElementById('player').classList.add('visible');
  document.getElementById('player-title').textContent=item.name;
  document.getElementById('player-sub').textContent=TYPE_LABEL[item.type];
  const pt=document.getElementById('player-thumb');
  pt.innerHTML=item.thumb?`<img src="${item.thumb}" alt="" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:20px">${ICONS[item.type]||'🎵'}</span>`;
  document.getElementById('add-to-pl-quick').style.display='flex';
}
function closeVideo(){const vm=document.getElementById('video-modal');document.getElementById('vid-player').pause();document.getElementById('vid-player').src='';vm.classList.remove('open');}
function togglePlay(){
  if(!audio.src)return;
  if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}
  updatePlayBtn();
}
function updatePlayBtn(){
  document.getElementById('play-icon').innerHTML=isPlaying?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>':'<path d="M8 5v14l11-7z"/>';
}
function nextTrack(){
  const pos=currentQueue.indexOf(currentIdx);
  const next=currentQueue[(pos+1)%currentQueue.length];
  if(next!==undefined)playItem(next);
}
function prevTrack(){
  if(audio.currentTime>3){audio.currentTime=0;return;}
  const pos=currentQueue.indexOf(currentIdx);
  const prev=currentQueue[(pos-1+currentQueue.length)%currentQueue.length];
  if(prev!==undefined)playItem(prev);
}
function fmtTime(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
audio.addEventListener('timeupdate',()=>{
  const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('time-cur').textContent=fmtTime(audio.currentTime);
  document.getElementById('time-tot').textContent=fmtTime(audio.duration);
});
audio.addEventListener('ended',()=>{isPlaying=false;updatePlayBtn();nextTrack()});
audio.addEventListener('play',()=>{isPlaying=true;updatePlayBtn()});
audio.addEventListener('pause',()=>{isPlaying=false;updatePlayBtn()});
function seekTo(e){if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}

// ─── THUMB ───────────────────────────────────────────────────────────
function openThumbModal(e,id){
  e.stopPropagation();thumbEditId=id;thumbPendingData=null;
  const item=library.find(f=>f.id===id);if(!item)return;
  document.getElementById('thumb-modal-name').textContent=item.name;
  const prev=document.getElementById('thumb-preview');
  prev.innerHTML=item.thumb?`<img src="${item.thumb}" alt="" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:48px">${ICONS[item.type]||'🎵'}</span>`;
  document.getElementById('thumb-file-input').value='';
  document.getElementById('thumb-modal').classList.add('open');
}
function closeThumbModal(){document.getElementById('thumb-modal').classList.remove('open');thumbEditId=null;thumbPendingData=null;}
function previewThumb(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{thumbPendingData=e.target.result;document.getElementById('thumb-preview').innerHTML=`<img src="${thumbPendingData}" alt="" style="width:100%;height:100%;object-fit:cover">`;};
  reader.readAsDataURL(file);
}
async function saveThumb(){
  if(!thumbEditId||!thumbPendingData){closeThumbModal();return;}
  const item=library.find(f=>f.id===thumbEditId);if(!item)return;
  item.thumb=thumbPendingData;
  await dbPut('files',item);
  closeThumbModal();await refresh();
  if(currentIdx>=0&&library[currentIdx]&&library[currentIdx].id===thumbEditId)updatePlayerUI(library[currentIdx]);
  showToast('Miniature enregistrée');
}

// ─── DRAG DROP ───────────────────────────────────────────────────────
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files);});

// ─── TOAST ───────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── MEDIA SESSION ───────────────────────────────────────────────────
function updateMediaSession(item){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({title:item.name,artist:'OfflinePlay',artwork:item.thumb?[{src:item.thumb,sizes:'512x512',type:'image/jpeg'}]:[]});
  navigator.mediaSession.setActionHandler('play',()=>{audio.play();});
  navigator.mediaSession.setActionHandler('pause',()=>{audio.pause();});
  navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
}
audio.addEventListener('play',()=>{if(currentIdx>=0)updateMediaSession(library[currentIdx]);});

// ─── INIT ────────────────────────────────────────────────────────────
openDB().then(()=>refresh());

// Service Worker registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
