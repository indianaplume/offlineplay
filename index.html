<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="true">
<meta name="apple-mobile-web-app-capable" content="true">
<title>OfflinePlay</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --accent:#e50914;--border:#2a2a2a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
button,input,textarea{font-family:inherit}

/* ═══════════════ PROFILE SCREEN ═══════════════ */
#profile-screen{position:fixed;inset:0;z-index:1000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
#profile-screen.hidden{display:none}
.ps-title{font-size:24px;font-weight:700;margin-bottom:28px}
.profiles-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:400px;margin-bottom:24px}
.profile-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.profile-card:active{opacity:0.7}
.profile-avatar-wrap{width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid transparent;transition:border-color 0.2s;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.profile-card:hover .profile-avatar-wrap{border-color:#fff}
.profile-avatar-wrap svg,.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.profile-pname{font-size:12px;color:var(--text2);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-profile-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.add-profile-card:active{opacity:0.7}
.add-profile-circle{width:80px;height:80px;border-radius:50%;background:var(--bg3);border:3px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text2);transition:border-color 0.2s}
.add-profile-card:hover .add-profile-circle{border-color:var(--text2)}
.add-profile-label{font-size:12px;color:var(--text2)}

/* PROFILE MODAL */
#profile-modal{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0.85);align-items:flex-end;justify-content:center}
#profile-modal.open{display:flex}
.pm-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + var(--safe-bot));width:100%;max-height:90vh;overflow-y:auto}
.pm-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.pm-title{font-size:17px;font-weight:600;margin-bottom:14px;text-align:center}
.pm-avatar-big{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;overflow:hidden;background:var(--bg3);border:3px solid var(--border);display:flex;align-items:center;justify-content:center}
.pm-avatar-big svg,.pm-avatar-big img{width:100%;height:100%;object-fit:cover}
.pm-section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin-bottom:10px}
.pm-chars-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.pm-char{width:100%;aspect-ratio:1;border-radius:50%;background:var(--bg3);border:2px solid transparent;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s}
.pm-char.sel{border-color:#fff}
.pm-char svg,.pm-char img{width:90%;height:90%;object-fit:cover;border-radius:50%}
.pm-colors{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pm-color{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.pm-color.sel{border-color:#fff}
.pm-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;margin-bottom:14px;text-align:center}
.pm-actions{display:flex;gap:8px}
.pm-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.pm-btn.sec{background:var(--bg3);color:var(--text2)}
.pm-btn.pri{background:var(--accent);color:#fff}
.pm-btn:active{opacity:0.8}

/* ═══════════════ APP ═══════════════ */
#app{display:none;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#app.visible{display:flex}
#topbar{display:flex;align-items:center;gap:10px;padding:10px 16px 6px;flex-shrink:0}
.app-logo{font-size:20px;font-weight:900;color:var(--accent);letter-spacing:-0.5px;flex:1;cursor:pointer}
.icon-btn{background:var(--bg3);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.icon-btn:active{opacity:0.7}
#profile-chip{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px}
#chip-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center}
#chip-avatar svg,#chip-avatar img{width:100%;height:100%;object-fit:cover}
.lists-btn{margin-left:2px}
.lo-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.lo-card:active{opacity:0.7}
.lo-name{font-size:15px;font-weight:600;margin-bottom:4px}
.lo-stats{display:flex;gap:14px;font-size:11px;color:var(--text2)}
.lo-cover-row{display:flex;margin-top:10px;gap:-10px}
.lo-thumb-stack{display:flex}
.lo-thumb-stack img,.lo-thumb-stack .lo-thumb-ph{width:42px;height:42px;border-radius:7px;object-fit:cover;border:2px solid var(--bg2);margin-left:-10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px}
.lo-thumb-stack >:first-child{margin-left:0}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:4px}

/* HERO BANNER */
.hero-banner{position:relative;width:100%;height:460px;overflow:hidden;flex-shrink:0;margin-bottom:22px}
.hero-track{display:flex;height:100%;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
.hero-slide{flex-shrink:0;width:100%;height:100%;position:relative;cursor:pointer}
.hero-slide img{width:100%;height:100%;object-fit:cover;display:block}
.hero-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;font-size:56px}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.35) 50%,rgba(0,0,0,0.05) 75%,transparent 100%)}
.hero-new-badge{position:absolute;top:16px;left:16px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:0.04em;padding:4px 9px;border-radius:5px;z-index:2;text-transform:uppercase}
.hero-info{position:absolute;bottom:20px;left:16px;right:16px}
.hero-title{font-size:23px;font-weight:800;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,0.95);line-height:1.15}
.hero-desc{font-size:12.5px;color:rgba(255,255,255,0.82);line-height:1.4;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.hero-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.hero-meta-tag{font-size:11px;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.12);padding:2px 8px;border-radius:5px}
.hero-add-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.16);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer}
.hero-add-btn:active{background:rgba(255,255,255,0.28)}
.hero-add-btn.added{background:rgba(255,255,255,0.9);color:#000;border-color:#fff}
.hero-dots{position:absolute;bottom:18px;right:16px;display:flex;gap:5px}
.hero-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.4);transition:background 0.3s}
.hero-dot.active{background:#fff}

/* SECTIONS */
.section{padding:0 16px;margin-bottom:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2)}
.section-action{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.section-action:active{background:var(--bg3)}

/* TOP 10 — style "numero a gauche + poster horizontal + infos dessous" */
.top10-scroll{display:flex;overflow-x:auto;padding:6px 16px 8px;-webkit-overflow-scrolling:touch;gap:22px}
.top10-scroll::-webkit-scrollbar{display:none}
.top10-card{flex-shrink:0;position:relative;cursor:pointer;display:flex;align-items:flex-end}
.top10-card:active{opacity:0.8}
.top10-rank{font-size:64px;font-weight:900;line-height:1;color:#fff;flex-shrink:0;margin-right:-14px;margin-bottom:30px;user-select:none;font-family:Arial,sans-serif;letter-spacing:-2px}
.top10-poster-wrap{position:relative;z-index:1}
.top10-poster{border-radius:8px;object-fit:cover;display:block;background:var(--bg3);width:172px;height:97px}
.top10-noposter{border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;width:172px;height:97px}
.top10-card.t-film .top10-poster,.top10-card.t-film .top10-noposter{width:140px;height:97px}
.top10-info{margin-top:8px;max-width:172px}
.top10-card.t-film .top10-info{max-width:140px}
.top10-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.top10-meta{font-size:11px;color:#ff6b81;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top10-card.playing .top10-poster,.top10-card.playing .top10-noposter{outline:2px solid #fff}
.top10-col{display:flex;flex-direction:column}

/* FRANCHISES STRIP */
.franchise-scroll{display:flex;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch;gap:10px}
.franchise-scroll::-webkit-scrollbar{display:none}
.franchise-card{flex-shrink:0;width:128px;height:72px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:14px;position:relative;overflow:hidden}
.franchise-card:active{opacity:0.8;transform:scale(0.97)}
.franchise-card img{max-width:100%;max-height:100%;object-fit:contain;position:relative;z-index:1}

/* MUSIC GRID - small 3 cols */
.music-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.music-card{background:var(--bg2);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);position:relative}
.music-card:active{opacity:0.7}
.music-card.playing{border-color:#fff}
.music-thumb{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;overflow:hidden}
.music-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.music-thumb .em{position:relative;z-index:1}
.music-body{padding:5px 7px 7px}
.music-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-plays{font-size:9px;color:var(--text2);margin-top:1px}
.mplay-ind{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:none;gap:2px;align-items:flex-end;height:10px;z-index:3}
.music-card.playing .mplay-ind{display:flex}
.mplay-ind span{width:2px;background:#fff;border-radius:1px;animation:bar 0.8s ease-in-out infinite}
.mplay-ind span:nth-child(2){animation-delay:.15s}
.mplay-ind span:nth-child(3){animation-delay:.3s}
@keyframes bar{0%,100%{height:2px}50%{height:9px}}

/* VIDEO / FILM GRID - 2 cols */
.vf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.vf-grid.compact{grid-template-columns:repeat(3,1fr);gap:8px}
.vf-grid.compact .vf-thumb{font-size:20px}
.vf-grid.compact .vf-body{padding:6px}
.vf-grid.compact .vf-name{font-size:10.5px}
.vf-grid.compact .vf-plays{font-size:9px}
.vf-grid.compact .badge-off{font-size:8px;padding:1px 5px}
.vf-grid.compact .c-btn{padding:2px 5px;font-size:9px}
.vf-grid.posters{grid-template-columns:repeat(3,1fr);gap:10px}
.vf-grid.posters .vf-thumb{aspect-ratio:2/3;font-size:24px}
.vf-grid.posters .vf-body{padding:6px 4px}
.vf-grid.posters .vf-name{font-size:11px;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.25}
.vf-grid.posters .vf-plays{font-size:9.5px}
.vf-grid.posters .card-acts{gap:2px;flex-wrap:wrap;justify-content:flex-end;max-width:78%}
.vf-grid.posters .c-btn{padding:2px 4px;font-size:9px}
.vf-grid.posters .badge-off{font-size:7px;padding:1px 4px}
.vf-card{background:var(--bg2);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);position:relative}
.vf-card:active{opacity:0.7}
.vf-card.playing{border-color:#fff}
.vf-thumb{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden}
.vf-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.vf-thumb .em{position:relative;z-index:1}
.vf-body{padding:8px}
.vf-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vf-plays{font-size:10px;color:var(--text2);margin-top:2px}
.card-acts{position:absolute;top:5px;right:5px;z-index:5;display:flex;gap:3px}
.c-btn{background:rgba(0,0,0,0.7);border:none;border-radius:5px;color:#fff;font-size:10px;padding:3px 6px}
.c-btn.del{color:#ff6b6b}
.c-btn:active{opacity:0.7}
.badge-off{position:absolute;top:5px;left:5px;z-index:4;background:rgba(0,0,0,0.65);color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}

/* PLAYLISTS */
.playlist-list{display:flex;flex-direction:column;gap:8px}
.playlist-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.playlist-item:active{opacity:0.7}
.pl-icon{width:40px;height:40px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.pl-icon img{width:100%;height:100%;object-fit:cover}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-meta{font-size:11px;color:var(--text2);margin-top:1px}
.pl-del{background:none;border:none;color:var(--text3);font-size:16px;padding:4px;flex-shrink:0}
.pl-del:active{color:#ff6b6b}
.new-btn{background:var(--bg2);border:1px dashed var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text2);width:100%}
.new-btn:active{background:var(--bg3)}

/* CHANNELS */
.ch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.ch-card:active{opacity:0.7}
.ch-av{width:50px;height:50px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;border:2px solid var(--border)}
.ch-av img{width:100%;height:100%;object-fit:cover}
.ch-name{font-size:11px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.ch-meta{font-size:10px;color:var(--text2)}
.new-ch-btn{background:var(--bg2);border:1px dashed var(--border);border-radius:12px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11px;color:var(--text2);width:100%;min-height:100px}
.new-ch-btn:active{background:var(--bg3)}

/* CHANNEL / PLAYLIST VIEW */
.fullview{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;padding-bottom:160px}
.fullview.open{display:block}
.fv-header{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-top)+12px) 16px 14px;border-bottom:1px solid var(--border)}
.fv-back{background:var(--bg3);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0}
.fv-title{font-size:16px;font-weight:600;flex:1}
.fv-actions{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
.fv-btn{flex:1;padding:9px;border-radius:10px;border:none;font-size:13px;font-weight:600}
.fv-btn.pri{background:var(--accent);color:#fff}
.fv-btn.sec{background:var(--bg3);color:var(--text)}
.fv-btn.dan{background:#3a1a1a;color:#ff6b6b;flex:0;padding:9px 14px}
.fv-btn:active{opacity:0.8}
.track-list{padding:10px 16px}
.track-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.track-item:last-child{border-bottom:none}
.track-item:active{opacity:0.7}
.tr-thumb{width:40px;height:40px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.tr-thumb img{width:100%;height:100%;object-fit:cover}
.tr-info{flex:1;min-width:0}
.tr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-type{font-size:11px;color:var(--text2);margin-top:1px}
.tr-del{background:none;border:none;color:var(--text3);font-size:16px;padding:4px;flex-shrink:0}

/* PLAYER */
#player{background:var(--bg2);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:calc(6px + var(--safe-bot));flex-shrink:0;display:none}
#player.visible{display:block}
.pl-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
#pl-thumb{width:40px;height:40px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
#pl-thumb img{width:100%;height:100%;object-fit:cover}
#pl-info{flex:1;min-width:0}
#pl-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#pl-sub{font-size:11px;color:var(--text2);margin-top:1px}
.pl-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.pp-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px;display:flex;font-size:22px;border-radius:50%}
.pp-btn:active{color:var(--text)}
.pp-btn.main{background:#fff;color:#000;width:40px;height:40px;justify-content:center;font-size:18px;border-radius:50%}
.pp-btn.main:active{opacity:0.8}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#prog-bar{flex:1;height:3px;background:var(--bg4);border-radius:2px;cursor:pointer}
#prog-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width 0.4s linear}
.ptime{font-size:10px;color:var(--text2);min-width:28px}
.vol-row{display:flex;align-items:center;gap:6px}
.vol-icon{font-size:11px;color:var(--text3)}
#vol-bar{width:90px;-webkit-appearance:none;appearance:none;height:2px;border-radius:2px;background:var(--bg4);outline:none;cursor:pointer;flex-shrink:0}
#vol-bar::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff}
#vol-bar::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:#fff;border:none}

/* NAV */
#nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bot);background:var(--bg)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;cursor:pointer;gap:3px;border:none;background:none;color:var(--text2);font-size:9px;font-weight:500;letter-spacing:0.03em}
.nav-tab.active{color:var(--text)}
.nav-tab svg{width:20px;height:20px}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-height:85vh;overflow-y:auto}
.m-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.m-title{font-size:16px;font-weight:600;margin-bottom:4px}
.m-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.m-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px;overflow:hidden}
.m-preview img{width:100%;height:100%;object-fit:cover}
.m-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:12px}
.m-actions{display:flex;gap:8px;margin-top:4px}
.m-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer}
.m-btn.sec{background:var(--bg3);color:var(--text2)}
.m-btn.pri{background:var(--accent);color:#fff}
.m-btn.dan{background:#3a1a1a;color:#ff6b6b}
.m-btn:active{opacity:0.8}
.pick-check{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.pick-check.checked{background:#fff;border-color:#fff;color:#000}

/* VIDEO FULLSCREEN */
#video-modal{display:none;position:fixed;inset:0;z-index:600;background:#000;align-items:center;justify-content:center;flex-direction:column}
#video-modal.open{display:flex}
#vid-player{width:100%;max-height:80vh}
#vid-close{margin-top:14px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;cursor:pointer}

/* CHANNEL MODAL */
#channel-modal .m-av-preview{width:72px;height:72px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;overflow:hidden;border:2px solid var(--border);margin:0 auto 8px}
#channel-modal .m-av-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.5}
.import-big{margin:14px auto 0;display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg4);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SEARCH */
#search-bar{padding:0 16px 10px;flex-shrink:0}
#search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 16px 10px 38px;font-size:14px;color:var(--text);outline:none;font-family:inherit}
#search-input:focus{border-color:var(--text3)}
#search-wrap{position:relative}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
#search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;display:none;padding:0}
#search-results{padding:0 16px}
.search-section-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin:14px 0 8px}
.search-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}

/* REMOTE PC */
.pc-status{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:14px}
.pc-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);flex-shrink:0}
.pc-dot.online{background:#1db954;box-shadow:0 0 6px #1db954}
.pc-dot.checking{background:#ff9800;animation:pdot 1s infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.3}}
.pc-name-el{font-size:13px;font-weight:600}
.pc-status-el{font-size:11px;color:var(--text2);margin-top:2px}
.remote-play-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.remote-play-btn:active{opacity:0.8}
.remote-play-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.remote-last{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px}
.remote-last-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.remote-last-item{display:flex;align-items:center;gap:10px}
.remote-last-thumb{width:36px;height:36px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.remote-last-thumb img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>

<!-- ═══ PROFILE SCREEN ═══ -->
<div id="profile-screen">

<!-- ═══ PROFILE MODAL ═══ -->

    </button>
    <button class="icon-btn" onclick="document.getElementById('file-input').click()" aria-label="Importer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="file-input" style="display:none" multiple accept="audio/*,video/*" onchange="handleFiles(this.files)">
  </div>
  <div id="search-bar-wrap" style="padding:0 16px 8px;flex-shrink:0">
    <div id="search-wrap" style="position:relative">
      <span id="search-icon" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none">&#128269;</span>
      <input type="search" id="search-input" style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:9px 36px 9px 36px;font-size:14px;color:var(--text);outline:none;font-family:inherit" placeholder="Rechercher..." oninput="onSearch(this.value)" autocomplete="off" autocorrect="off">
      <button id="search-clear" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;display:none;padding:0" onclick="clearSearch()">&#10005;</button>
    </div>
  </div>
  <div id="search-results" style="display:none;overflow-y:auto;flex:1;padding:0 16px"></div>
  <div id="content"></div>
  <div id="player">
    <div class="pl-top">
      <div id="pl-thumb"><span>&#127925;</span></div>
      <div id="pl-info"><div id="pl-title">&#8212;</div><div id="pl-sub">&#8212;</div></div>
      <button class="icon-btn" onclick="openAddToPlModal()" style="background:transparent;border:1px solid var(--border)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="prog-row">
      <span class="ptime" id="t-cur">0:00</span>
      <div id="prog-bar" onclick="seekTo(event)"><div id="prog-fill"></div></div>
      <span class="ptime" id="t-tot">0:00</span>
    </div>
    <div class="pl-controls" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:16px">
        <button class="pp-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="pp-btn main" id="play-btn" onclick="togglePlay()"><svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="pp-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      </div>
      <div class="vol-row">
        <span class="vol-icon">&#128264;</span>
        <input type="range" id="vol-bar" min="0" max="1" step="0.01" value="1" oninput="audio.volume=this.value">
        <span class="vol-icon">&#128266;</span>
      </div>
    </div>
  </div>
  <nav id="nav">
    <button class="nav-tab active" id="tab-home" onclick="showTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="nav-tab" id="tab-music" onclick="showTab('music')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Musique
    </button>
    <button class="nav-tab" id="tab-videos" onclick="showTab('videos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Videos
    </button>
    <button class="nav-tab" id="tab-films" onclick="showTab('films')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
      Films

</div>

<script>
// ═══════════════════════════════════════════
//  AVATARS — 15 personnages SVG illustrés

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      ['files','playlists','channels'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id',autoIncrement:true});});
      if(!d.objectStoreNames.contains('thumbs'))d.createObjectStore('thumbs',{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=rej;
  });
}
const dbAll=s=>new Promise(res=>{const t=db.transaction(s,'readonly'),q=t.objectStore(s).getAll();q.onsuccess=()=>res(q.result);});
const dbAdd=(s,d)=>new Promise((res,rej)=>{
  const rec={...d};delete rec.id; // remove id so autoIncrement works
  const t=db.transaction(s,'readwrite');
  const store=t.objectStore(s);
  const q=store.add(rec);
  q.onsuccess=()=>res(q.result);
  q.onerror=()=>rej(q.error);
  t.onerror=()=>rej(t.error);
});
const dbPut=(s,d)=>new Promise(res=>{const t=db.transaction(s,'readwrite');t.objectStore(s).put(d);t.oncomplete=()=>res();});
const dbDel=(s,id)=>new Promise(res=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(id);t.oncomplete=()=>res();});
// Thumb stored separately to avoid size quota on large video files
const dbPutThumb=(id,data)=>new Promise(res=>{const t=db.transaction('thumbs','readwrite');t.objectStore('thumbs').put({id,data});t.oncomplete=()=>res();});
const dbGetThumb=(id)=>new Promise(res=>{const t=db.transaction('thumbs','readonly');const q=t.objectStore('thumbs').get(id);q.onsuccess=()=>res(q.result?q.result.data:null);q.onerror=()=>res(null);});
const dbDelThumb=(id)=>new Promise(res=>{const t=db.transaction('thumbs','readwrite');t.objectStore('thumbs').delete(id);t.oncomplete=()=>res();});
// Save file metadata without the binary data blob (for quick updates)
const dbPutMeta=(s,item)=>new Promise(res=>{const t=db.transaction(s,'readwrite');t.objectStore(s).put(item);t.oncomplete=()=>res();});

async function refresh(){
  library=await dbAll('files');
  // Load thumbs separately for each file
  await Promise.all(library.map(async f=>{
    if(f.thumbId){
      const td=await dbGetThumb(f.thumbId);
      if(td)f.thumb=td;
    }
  }));
  playlists=await dbAll('playlists');
  channels=await dbAll('channels');
  renderTab();
}

async function handleFiles(files){
  if(!files||!files.length)return;
  let count=0;
  for(const file of files){
    try{
      // Store as Blob instead of ArrayBuffer — more memory-efficient for large files
      const t=file.type.startsWith('video')?'video':'audio';
      const fileBlob=file.slice(0,file.size,file.type);
      await dbAdd('files',{name:file.name.replace(/\.[^.]+$/,''),type:t,mime:file.type,data:fileBlob,size:file.size,thumbId:null,plays:0,isFilm:false,added:Date.now()});
      count++;
    } catch(err){
      console.error('Import error for '+file.name+':', err);
      // Fallback: try with ArrayBuffer
      try{
        const buf=await file.arrayBuffer();
        const t=file.type.startsWith('video')?'video':'audio';
        await dbAdd('files',{name:file.name.replace(/\.[^.]+$/,''),type:t,mime:file.type,data:buf,size:file.size,thumbId:null,plays:0,isFilm:false,added:Date.now()}); // no id field — autoIncrement handles it
        count++;
      } catch(err2){
        console.error('Fallback also failed:', err2);
        showToast('Erreur import: '+file.name);
      }
    }
  }
  if(count>0){
    await refresh();
    showToast(count+' fichier'+(count>1?'s':'')+' ajoute'+(count>1?'s':''));
  }
  document.getElementById('file-input').value='';
}

let heroInterval=null,heroIdx=0;

function top10Card(f,i,kind,emoji){
  const gi=library.indexOf(f);
  const metaParts=[];
  if(kind==='film'){
    metaParts.push('Film');
    if(f.durationMin)metaParts.push(fmtDurationShort(f.durationMin));
    if(f.releaseDate)metaParts.push(new Date(f.releaseDate).getFullYear());
  } else if(kind==='video'){
    metaParts.push('Video');
    metaParts.push((f.plays||0)+' vue'+((f.plays||0)!==1?'s':''));
  } else {
    metaParts.push('Musique');
    metaParts.push((f.plays||0)+' ecoute'+((f.plays||0)!==1?'s':''));
  }
  return `<div class="top10-card t-${kind}${currentIdx===gi?' playing':''}" onclick="playItem(${gi})">
    <div class="top10-rank">${i+1}</div>
    <div class="top10-col">
      <div class="top10-poster-wrap">${f.thumb?`<img src="${f.thumb}" class="top10-poster" alt="">`:`<div class="top10-noposter">${emoji}</div>`}</div>
      <div class="top10-info">
        <div class="top10-title">${f.name}</div>
        <div class="top10-meta">${metaParts.join(' &bull; ')}</div>
      </div>
    </div>
  </div>`;
}

      html+=top10Card(f,i,'music','🎵');
    });
    html+='</div><div style="height:30px"></div>';
  }

  // Top 10 videos
  const videos=library.filter(f=>f.type==='video'&&!f.isFilm);
  if(videos.length){
    const top=videos.slice().sort((a,b)=>(b.plays||0)-(a.plays||0)).slice(0,10);
    html+='<div class="section" style="padding-bottom:0"><div class="section-header"><span class="section-title">TOP 10 VIDEOS</span><button class="section-action" onclick="showTab(\'videos\')">Voir plus &#8250;</button></div></div><div class="top10-scroll">';
    top.forEach((f,i)=>{

    });
    html+='</div><div style="height:30px"></div>';
  }

  const films=library.filter(f=>f.isFilm||f.type==='film');

    const top=films.slice().sort((a,b)=>(b.plays||0)-(a.plays||0)).slice(0,10);

function isInAnyDefaultList(fid){
  return playlists.some(p=>(p.profileId===currentProfile.id)&&(p.tracks||[]).includes(fid));
}
function updateHeroAddBtn(fid){
  const btn=document.getElementById('hero-add-'+fid);
  if(!btn)return;
  const inList=isInAnyDefaultList(fid);
  btn.classList.toggle('added',inList);
  btn.innerHTML=inList?'&#10003; Ajoutee':quickAddIcon()+' Ajouter a la liste';
}
async function quickAddToList(fid,btnEl){
  // Open the "add to list" picker for this single file
  quickAddFileId=fid;
  await ensureDefaultListExists();
  document.getElementById('qa-list').innerHTML=myPlaylists().map(p=>{
    const has=(p.tracks||[]).includes(fid);
    return `<div class="atp-item" onclick="toggleQuickAdd(${p.id})">
      <span>${p.name}</span>
      <span style="color:${has?'#fff':'var(--text3)'}">${has?'&#10003;':'+'}</span>
    </div>`;
  }).join('');
  document.getElementById('qa-modal').classList.add('open');
}
let quickAddFileId=null;
async function ensureDefaultListExists(){
  const mine=myPlaylists();
  if(!mine.length){
    await dbAdd('playlists',{name:'Ma liste',profileId:currentProfile.id,tracks:[],created:Date.now()});
    playlists=await dbAll('playlists');
  }
}
async function toggleQuickAdd(plId){
  const pl=playlists.find(p=>p.id===plId);if(!pl)return;
  pl.tracks=pl.tracks||[];
  const has=pl.tracks.includes(quickAddFileId);
  if(has)pl.tracks=pl.tracks.filter(id=>id!==quickAddFileId);
  else pl.tracks.push(quickAddFileId);
  await dbPut('playlists',pl);
  playlists=await dbAll('playlists');
  quickAddToList(quickAddFileId);
  updateHeroAddBtn(quickAddFileId);
}
function closeQaModal(){document.getElementById('qa-modal').classList.remove('open');quickAddFileId=null;renderTab();}

function vfCard(f,isFilm){
  const gi=library.indexOf(f);
  const filmBtn=!isFilm?`<button class="c-btn" onclick="markAsFilm(event,${f.id})" title="Marquer comme Film" style="font-size:9px">Film</button>`:`<button class="c-btn" onclick="unmarkFilm(event,${f.id})" title="Retirer des Films" style="font-size:9px;color:#ff9800">Video</button>`;
  const infoBtn=isFilm?`<button class="c-btn" onclick="event.stopPropagation();openFilmInfoModal(${f.id})" title="Infos">&#9998;</button>`:'';
  const metaParts=[];
  if(isFilm&&f.releaseDate)metaParts.push(new Date(f.releaseDate).getFullYear());
  if(isFilm&&f.durationMin)metaParts.push(fmtDurationShort(f.durationMin));
  if(!metaParts.length)metaParts.push((f.plays||0)+' vue'+((f.plays||0)!==1?'s':''));
  return `<div class="vf-card${currentIdx===gi?' playing':''}" onclick="playItem(${gi})">
    <span class="badge-off">offline</span>
    <div class="card-acts"><button class="c-btn" onclick="openThumbModal(event,${f.id})">&#128247;</button>${infoBtn}${filmBtn}<button class="c-btn del" onclick="confirmDelFile(event,${f.id})">&#128465;</button></div>
    <div class="vf-thumb">${f.thumb?`<img src="${f.thumb}" alt="">`:'<span class="em">🎬</span>'}</div>
    <div class="vf-body"><div class="vf-name">${f.name}</div><div class="vf-plays">${metaParts.join(' &bull; ')}</div></div>
  </div>`;
}
function fmtDurationShort(min){
  const h=Math.floor(min/60),m=min%60;
  return h?`${h}h${m?(' '+m+'min'):''}`:`${m}min`;
}

let filmInfoEditId=null;
async function markAsFilm(e,id){
  e.stopPropagation();
  openFilmInfoModal(id);
}
function openFilmInfoModal(id){
  const f=library.find(x=>x.id===id);if(!f)return;
  filmInfoEditId=id;
  document.getElementById('fi-name').textContent=f.name;
  document.getElementById('fi-desc-input').value=f.description||'';
  document.getElementById('fi-date-input').value=f.releaseDate||'';
  const fsel=document.getElementById('fi-franchise-input');
  fsel.innerHTML='<option value="">Aucune</option>'+FRANCHISES.map(fr=>`<option value="${fr.name}">${fr.name}</option>`).join('');
  fsel.value=f.franchise||'';
  const dm=f.durationMin||0;
  document.getElementById('fi-dur-h').value=dm?Math.floor(dm/60):'';
  document.getElementById('fi-dur-m').value=dm?dm%60:'';
  document.getElementById('film-info-modal').classList.add('open');
}
function closeFilmInfoModal(){document.getElementById('film-info-modal').classList.remove('open');filmInfoEditId=null;}
async function saveFilmInfo(){
  const f=library.find(x=>x.id===filmInfoEditId);if(!f)return;
  const h=parseInt(document.getElementById('fi-dur-h').value)||0;

function listOverviewCard(p){
  const tracks=(p.tracks||[]).map(id=>library.find(f=>f.id===id)).filter(Boolean);
  const count=tracks.length;
  const totalMin=tracks.reduce((sum,f)=>sum+estimateDurationMin(f),0);
  const thumbs=tracks.slice(0,4).map(f=>f.thumb?`<img src="${f.thumb}" alt="">`:`<div class="lo-thumb-ph">${ICONS[f.type]||'🎵'}</div>`).join('');
  return `<div class="lo-card" onclick="openPlaylistView(${p.id})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="lo-name">${p.name}</div>
        <div class="lo-stats"><span>${count} element${count!==1?'s':''}</span><span>${fmtDurationShort(totalMin)} au total</span></div>
      </div>
      <button class="pl-del" onclick="confirmDelPlaylist(event,${p.id})" style="position:static">&#128465;</button>
    </div>
    ${count?`<div class="lo-cover-row"><div class="lo-thumb-stack">${thumbs}</div></div>`:''}
  </div>`;
}

// Estimation de duree: utilise audio.duration cache si dispo, sinon durationMin (films), sinon 0
function estimateDurationMin(f){
  if(f.durationMin)return f.durationMin;
  if(f.cachedDurationSec)return Math.round(f.cachedDurationSec/60);
  return f.type==='audio'?4:(f.isFilm?100:20); // estimation par defaut raisonnable
}

async function playItem(idx){
  if(idx<0||idx>=library.length)return;
  const item=library[idx];currentIdx=idx;
  if(!currentQueue.length||!currentQueue.includes(idx))currentQueue=library.map((_,i)=>i);
  item.plays=(item.plays||0)+1;await dbPut('files',item);
  // Handle both Blob and ArrayBuffer storage formats
  let url;
  if(item.data instanceof Blob){
    url=URL.createObjectURL(item.data);
  } else {
    url=URL.createObjectURL(new Blob([item.data],{type:item.mime}));
  }
  if(item.type==='video'||item.isFilm){
    const vp=document.getElementById('vid-player');
    vp.src=url;
    vp.onloadedmetadata=()=>{
      if(vp.duration&&isFinite(vp.duration)&&!item.cachedDurationSec){item.cachedDurationSec=vp.duration;dbPut('files',item);}
    };
    document.getElementById('video-modal').classList.add('open');
    vp.play();
    updatePlayerUI(item);if(searchActive)onSearch(document.getElementById('search-input').value);else renderTab();return;
  }
  audio.src=url;audio.play().then(()=>{isPlaying=true;updatePlayBtn();}).catch(()=>{});
  updatePlayerUI(item);if(searchActive)onSearch(document.getElementById('search-input').value);else renderTab();
}
function updatePlayerUI(item){
  document.getElementById('player').classList.add('visible');
  document.getElementById('pl-title').textContent=item.name;
  document.getElementById('pl-sub').textContent=TYPE_LABEL[item.type];
  const pt=document.getElementById('pl-thumb');
  pt.innerHTML=item.thumb?`<img src="${item.thumb}" alt="" style="width:100%;height:100%;object-fit:cover">`:'<span style="font-size:18px">'+ICONS[item.type]+'</span>';
}
function closeVideo(){document.getElementById('vid-player').pause();document.getElementById('vid-player').src='';document.getElementById('video-modal').classList.remove('open');}
function togglePlay(){if(!audio.src)return;if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}updatePlayBtn();}
function updatePlayBtn(){document.getElementById('play-icon').innerHTML=isPlaying?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>':'<path d="M8 5v14l11-7z"/>';}
function nextTrack(){const pos=currentQueue.indexOf(currentIdx);playItem(currentQueue[(pos+1)%currentQueue.length]);}
function prevTrack(){if(audio.currentTime>3){audio.currentTime=0;return;}const pos=currentQueue.indexOf(currentIdx);playItem(currentQueue[(pos-1+currentQueue.length)%currentQueue.length]);}
function fmtTime(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function seekTo(e){if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}
audio.addEventListener('timeupdate',()=>{
  const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('t-cur').textContent=fmtTime(audio.currentTime);
  document.getElementById('t-tot').textContent=fmtTime(audio.duration);
});
audio.addEventListener('loadedmetadata',()=>{
  if(currentIdx>=0&&audio.duration&&isFinite(audio.duration)){
    const item=library[currentIdx];
    if(item&&!item.cachedDurationSec){item.cachedDurationSec=audio.duration;dbPut('files',item);}
  }
});
audio.addEventListener('ended',()=>{isPlaying=false;updatePlayBtn();nextTrack();});
audio.addEventListener('play',()=>{
  isPlaying=true;updatePlayBtn();
  if(!('mediaSession' in navigator)||currentIdx<0)return;
  const item=library[currentIdx];
  navigator.mediaSession.metadata=new MediaMetadata({title:item.name,artist:'OfflinePlay',artwork:item.thumb?[{src:item.thumb,sizes:'512x512',type:'image/jpeg'}]:[]});
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
});
audio.addEventListener('pause',()=>{isPlaying=false;updatePlayBtn();});


// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
let searchActive=false;

function onSearch(val){
  const q=val.trim().toLowerCase();
  const clearBtn=document.getElementById('search-clear');
  const resultsEl=document.getElementById('search-results');
  const contentEl=document.getElementById('content');
  clearBtn.style.display=q?'block':'none';
  if(!q){
    searchActive=false;
    resultsEl.style.display='none';
    resultsEl.style.padding='0';
    contentEl.style.display='block';
    return;
  }
  searchActive=true;
  contentEl.style.display='none';
  resultsEl.style.display='block';
  resultsEl.style.padding='0 16px';
  let html='';
  if(currentTab==='music'){
    const items=library.filter(f=>f.type==='audio'&&f.name.toLowerCase().includes(q));
    if(!items.length) html='<div class="search-empty">Aucun resultat pour <strong>'+val+'</strong></div>';
    else html='<div class="search-section-title">🎵 '+items.length+' musique'+(items.length!==1?'s':'')+'</div><div class="music-grid">'+items.map(f=>musicCard(f)).join('')+'</div>';
  } else if(currentTab==='videos'){
    const items=library.filter(f=>f.type==='video'&&!f.isFilm&&f.name.toLowerCase().includes(q));
    if(!items.length) html='<div class="search-empty">Aucun resultat pour <strong>'+val+'</strong></div>';
    else html='<div class="search-section-title">🎬 '+items.length+' video'+(items.length!==1?'s':'')+'</div><div class="vf-grid compact">'+items.map(f=>vfCard(f,false)).join('')+'</div>';
  } else if(currentTab==='films'){
    const items=library.filter(f=>(f.isFilm||f.type==='film')&&f.name.toLowerCase().includes(q));
    if(!items.length) html='<div class="search-empty">Aucun resultat pour <strong>'+val+'</strong></div>';
    else html='<div class="search-section-title">🎞 '+items.length+' film'+(items.length!==1?'s':'')+'</div><div class="vf-grid posters">'+items.map(f=>vfCard(f,true)).join('')+'</div>';
  } else {
    const music=library.filter(f=>f.type==='audio'&&f.name.toLowerCase().includes(q));
    const videos=library.filter(f=>f.type==='video'&&!f.isFilm&&f.name.toLowerCase().includes(q));
    const films=library.filter(f=>(f.isFilm||f.type==='film')&&f.name.toLowerCase().includes(q));
    if(!music.length&&!videos.length&&!films.length) html='<div class="search-empty">Aucun resultat pour <strong>'+val+'</strong></div>';
    if(music.length) html+='<div class="search-section-title">🎵 Musique ('+music.length+')</div><div class="music-grid">'+music.map(f=>musicCard(f)).join('')+'</div>';
    if(videos.length) html+='<div class="search-section-title">🎬 Videos ('+videos.length+')</div><div class="vf-grid compact">'+videos.map(f=>vfCard(f,false)).join('')+'</div>';
    if(films.length) html+='<div class="search-section-title">🎞 Films ('+films.length+')</div><div class="vf-grid posters">'+films.map(f=>vfCard(f,true)).join('')+'</div>';
  }
  resultsEl.innerHTML=html;
}

function clearSearch(){
  document.getElementById('search-input').value='';
  onSearch('');
}


// REMOTE PC
let pcOnline=false;
function openRemoteModal(){
  if(currentIdx>=0&&library[currentIdx]){
    const item=library[currentIdx];
    document.getElementById('remote-last').style.display='block';
    document.getElementById('remote-last-name').textContent=item.name;
    document.getElementById('remote-last-type').textContent=TYPE_LABEL[item.type]||item.type;
    const t=document.getElementById('remote-last-thumb');
    t.innerHTML=item.thumb?('<img src="'+item.thumb+'" alt="">'):(ICONS[item.type]||'&#127925;');
  }
  const saved=localStorage.getItem('op_pc_ip')||'';
  document.getElementById('remote-ip').value=saved;
  if(saved)checkPC();
  document.getElementById('remote-modal').classList.add('open');
}
async function checkPC(){
  const ip=document.getElementById('remote-ip').value.trim();
  if(!ip)return;
  localStorage.setItem('op_pc_ip',ip);
  document.getElementById('pc-dot').className='pc-dot checking';
  document.getElementById('pc-name-el').textContent='Connexion...';
  document.getElementById('pc-status-el').textContent=ip+':8765';
  try{
    const r=await fetch('http://'+ip+':8765/ping',{signal:AbortSignal.timeout(3000)});
    const d=await r.json();
    if(d.status==='ok'){
      document.getElementById('pc-dot').className='pc-dot online';
      document.getElementById('pc-name-el').textContent=d.pc||'PC connecte';
      document.getElementById('pc-status-el').textContent='En ligne - '+ip;
      pcOnline=true;
      document.getElementById('remote-play-btn').disabled=currentIdx<0;
    }
  }catch(e){
    document.getElementById('pc-dot').className='pc-dot';
    document.getElementById('pc-name-el').textContent='PC inaccessible';
    document.getElementById('pc-status-el').textContent='Verifie que lancer.bat tourne';
    pcOnline=false;
    document.getElementById('remote-play-btn').disabled=true;
  }
}
async function sendToPC(){
  if(!pcOnline||currentIdx<0||!library[currentIdx])return;
  const ip=document.getElementById('remote-ip').value.trim();
  const item=library[currentIdx];
  const btn=document.getElementById('remote-play-btn');
  btn.textContent='Envoi...';btn.disabled=true;
  try{
    const r=await fetch('http://'+ip+':8765/play',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:item.name,type:item.type}),
      signal:AbortSignal.timeout(5000)
    });
    const d=await r.json();
    if(d.status==='ok'){showToast('Lance sur ton PC : '+item.name);document.getElementById('remote-modal').classList.remove('open');}
  }catch(e){showToast('Erreur : PC inaccessible');}
  btn.innerHTML='&#9654; Lancer sur mon PC';btn.disabled=false;
}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();if(document.getElementById('app').classList.contains('visible'))handleFiles(e.dataTransfer.files);});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

  await openDB();
  loadProfiles();
  renderProfileScreen();
}
init();
